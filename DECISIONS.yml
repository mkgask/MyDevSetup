# DECISIONS.yml
# Current active decision list (mutable) for DOD (Decision Oriented Development)
# Use this file as the canonical list of active project decisions and implementation constraints.
# Keep the default decision shape lightweight so humans can scan the list quickly.
# Put background, trade-offs, rejected options, and research notes in records/{discussion-id}.md.
# records/{discussion-id}.md is discussion history only: do not put mutable tracking fields there
# (status, remaining work, or open action items that require later updates).
# Keep decision contracts explicit here only when they actively constrain implementation.
# When contract details need their own active rule, add them as small sub-decisions instead of
# forcing the same contract fields onto every decision node.

version: "1.0"
decisions:

  Installer:
    - id: installer-001-project-scope
      title: AI 利用開発環境の標準汎用インストーラーを提供する
      reason: >
        本リポジトリ（MyDevSetup）の主目的は、対象プロジェクトへ AI 開発環境アセットを
        一括配布する curl|bash 実行可能なインストーラーを提供すること。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions: []

    - id: installer-002-templates-agents-md
      title: templates/AGENTS.md をコピー元テンプレートとして配置する
      reason: >
        インストール時の AGENTS.md 配布元は templates/ 配下に置く。
        初期リリースでは中身空のファイルでよい。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-002-1-initial-empty
          title: 初期 AGENTS.md テンプレートは空ファイル
          reason: AGENTS.md の内容定義は別議論とし、インストーラー MVP では空テンプレートをコピーするのみ
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-003-install-sh-distribution
      title: ルート install.sh を curl|bash で直接実行可能にする
      reason: >
        リポジトリルートの install.sh を raw.githubusercontent.com 経由の
        curl -fsSL ... | bash 形式で配布・実行できること。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-003-1-curl-pattern
          title: 配布は curl -fsSL と bash パイプ形式
          reason: DODKit と同様のワンライナーインストール UX を採用する
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-003-2-installer-source
          title: MyDevSetup install.sh の取得元表記は mkgask/mydevsetup main
          reason: >
            運用上の正規表記として
            https://raw.githubusercontent.com/mkgask/mydevsetup/main/install.sh
            を配布URLに採用する
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-003-3-default-target
          title: install.sh のターゲット既定値は copilot
          reason: ターゲット未指定時の実行契約は DODKit と同様に copilot 既定へ揃える
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-004-supported-targets
      title: 対象 AI ツールは Copilot と Cursor のみ
      reason: >
        インストーラーが扱うエディタ/AI ターゲットは GitHub Copilot と Cursor に限定する。
        他ツール向け分岐は初期スコープ外。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-004-1-non-goals-other-ai
          title: 非目標 — Copilot/Cursor 以外の AI ツール対応
          reason: 初期 MVP では copilot/cursor 以外のターゲット分岐を実装しない
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-005-agents-md-deploy
      title: AGENTS.md はプロジェクトルートへ配置する（ターゲット共通）
      reason: >
        Copilot も Cursor も AGENTS.md の配置先はプロジェクトルートのみ。
        ターゲット別の追加配置や内容分岐は初期スコープ外。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-005-1-copy-from-templates
          title: AGENTS.md は templates/AGENTS.md からルートへコピー
          reason: 配布物 AGENTS.md の生成元は templates/AGENTS.md に固定する
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-005-2-agents-overwrite
          title: MyDevSetup の --force は AGENTS.md 上書き判定にのみ適用する
          reason: AGENTS.md の競合時は既定で保護し、--force 指定時のみ上書きを許可する
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-006-dodkit-bundled
      title: インストーラーは DODKit のインストールも実施する
      reason: >
        MyDevSetup の install.sh 実行時に、選択ターゲット向け DODKit アセットの
        インストールも行う。DODKit 単体インストールに置き換えない。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions: []

    - id: installer-007-dodkit-invocation
      title: DODKit には MyDevSetup が受け取った引数を透過委譲する
      reason: >
        MyDevSetup install.sh は DODKit install.sh の振る舞いを固定化せず、
        受領した引数列をそのまま `bash -s -- ...` で委譲する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-007-1-dodkit-source
          title: DODKit 取得元は mkgask/dodkit main の install.sh
          reason: >
            curl -fsSL https://raw.githubusercontent.com/mkgask/dodkit/main/install.sh
            をパイプ先 bash に -s -- <target> --force を渡して実行する
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-007-2-target-args
          title: ターゲット引数は copilot または cursor
          reason: DODKit install.sh の CLI 契約（copilot|cursor）に合わせる
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-007-3-decisions-protected
          title: DODKit による DECISIONS.yml 上書きは行わない
          reason: DODKit は DECISIONS.yml を上書き保護対象とする。既存プロジェクト決定を失わない
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-007-4-dodkit-force-fixed
          title: DODKit への引数は MyDevSetup 受領値をそのまま渡す
          reason: DODKit 側の動作は固定せず、ユーザーが指定した引数を優先して透過委譲する
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-008-console-log-format
      title: install.sh の成功/警告/エラー出力は絵文字ラベルと色付き表示を行う
      reason: >
        ユーザー可読性向上のため、成功/警告/エラーの行は
        それぞれ指定ラベルと指定色で視認可能にする。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-008-1-success-label-color
          title: 成功ログは [✅️SUCCESS] を緑で表示
          reason: 成功行を一目で識別可能にする
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-008-2-error-label-color
          title: エラーログは [❌️ERROR] を赤で表示
          reason: 失敗行を強調して判別しやすくする
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-008-3-warning-label-color
          title: 警告ログは [⚠️WARNING] を黄で表示
          reason: 要注意行を情報ログと区別する
          status: "✅️Implementation Approved"
          sub_decisions: []
