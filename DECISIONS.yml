# DECISIONS.yml
# Current active decision list (mutable) for DOD (Decision Oriented Development)
# Use this file as the canonical list of active project decisions and implementation constraints.
# Keep the default decision shape lightweight so humans can scan the list quickly.
# Put background, trade-offs, rejected options, and research notes in records/{discussion-id}.md.
# records/{discussion-id}.md is discussion history only: do not put mutable tracking fields there
# (status, remaining work, or open action items that require later updates).
# Keep decision contracts explicit here only when they actively constrain implementation.
# When contract details need their own active rule, add them as small sub-decisions instead of
# forcing the same contract fields onto every decision node.

version: "1.0"
decisions:

  # Replace this category name with a concern area or domain that groups related decisions.
  # Good defaults include Feature, Infrastructure, Business Logic, Security, Data, and CI/CD.
  # Prefer the top level to express what area the decisions belong to.
  # Keep specification, design, implementation, and test concerns as decision objects or
  # sub-decisions inside that area when they independently constrain implementation.
  Category Name:
    - # Required. Use a stable ID such as {category}-{sequence}-{shortname}.
      id: category-001-short-name
      # Required. Describe the decision in one line.
      title: Describe the decision in one line
      # Required. Describe the current binding reason in 1 to 3 concise lines.
      # Write the reason that constrains implementation now, not the full discussion history.
      reason: Explain why this decision currently constrains implementation
      # Optional. Prefer one of the default statuses below.
      # - ⚠️Discussion In Progress
      # - ⚠️Discussion Approved
      # - ⚠️Implementing
      # - ✅️Implementation Approved
      # Use exceptional states such as ⛔️On Hold or ⛔️Cancelled only when needed.
      status: "⚠️Discussion In Progress"
      # Optional. Point to the related discussion record when this decision family comes from one discussion.
      link: "records/category-001-discussion-topic.md"
      # Optional. Add children only when a contract detail or rule becomes independently active.
      # Use sub-decisions for invariants, non-goals, acceptance criteria, or failure conditions
      # only when those details need to be referenced on their own.
      # Example:
      # sub_decisions:
      #   - id: category-001-1-contract-detail
      #     title: Describe one independently active contract detail
      #     reason: Explain why this detail currently constrains implementation
      #     status: "⚠️Discussion Approved"
      #     sub_decisions: []
      sub_decisions: []

  # Example:
  # Feature:
  #   - id: feature-001-profile-editing
  #     title: User profile editing capability
  #     reason: This feature currently constrains UI, API, and validation work across the app
  #     status: "⚠️Implementing"
  #     link: "records/feature-001-profile-editing.md"
  #     sub_decisions:
  #       - id: feature-001-1-spec-fields
  #         title: Editable fields and validation rules
  #         reason: The API and form schema must agree on allowed fields before implementation
  #         status: "⚠️Discussion Approved"
  #         sub_decisions: []
  #       - id: feature-001-2-design-boundary
  #         title: Server and client responsibility boundary
  #         reason: Component structure and mutation flow depend on this boundary
  #         status: "⚠️Implementing"
  #         sub_decisions: []
  #       - id: feature-001-3-test-acceptance
  #         title: Acceptance coverage for success and rejection paths
  #         reason: The feature is incomplete unless valid updates succeed and invalid input is rejected
  #         status: "⚠️Discussion Approved"
  #         sub_decisions: []

  # Add more categories and decision objects as needed.
  # Prefer many small decisions over one overloaded entry.
  # Every rule that can change the next implementation decision should exist here.