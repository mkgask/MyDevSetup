# DECISIONS.yml
# Current active decision list (mutable) for DOD (Decision Oriented Development)
# Use this file as the canonical list of active project decisions and implementation constraints.
# Keep the default decision shape lightweight so humans can scan the list quickly.
# Put background, trade-offs, rejected options, and research notes in records/{discussion-id}.md.
# records/{discussion-id}.md is discussion history only: do not put mutable tracking fields there
# (status, remaining work, or open action items that require later updates).
# Keep decision contracts explicit here only when they actively constrain implementation.
# When contract details need their own active rule, add them as small sub-decisions instead of
# forcing the same contract fields onto every decision node.

version: "1.0"
decisions:

  Installer:
    - id: installer-001-project-scope
      decision: >
        本リポジトリは、対象プロジェクトへ AI 開発環境アセットを一括配布する
        curl -fsSL ... | bash 実行可能な標準汎用インストーラーを提供する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions: []

    - id: installer-002-templates-agents-md
      decision: >
        インストール時に配布する AGENTS.md のコピー元は templates/AGENTS.md に固定し、
        初期リリースでは内容定義を持たない空テンプレートを許容する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-002-1-initial-empty
          decision: AGENTS.md の内容定義は別議論とし、MVP では空ファイルのテンプレートをコピーする。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-003-install-sh-distribution
      decision: >
        リポジトリルートの install.sh は raw.githubusercontent.com 経由で取得し、
        curl -fsSL ... | bash 形式で直接実行可能にする。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-003-1-curl-pattern
          decision: DODKit と同等のワンライナー UX として curl -fsSL と bash パイプ形式を採用する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-003-2-installer-source
          decision: >
            MyDevSetup install.sh の配布 URL は
            https://raw.githubusercontent.com/mkgask/mydevsetup/main/install.sh
            を正規表記として扱う。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-003-3-default-target
          decision: ターゲット未指定時の install.sh 既定値は DODKit と揃えて copilot とする。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-004-supported-targets
      decision: >
        インストーラーが扱う AI ツールは GitHub Copilot と Cursor のみに限定し、
        それ以外のターゲット分岐は初期スコープ外とする。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-004-1-non-goals-other-ai
          decision: 非目標として Copilot/Cursor 以外への対応分岐は MVP で実装しない。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-005-agents-md-deploy
      decision: >
        Copilot/Cursor いずれのターゲットでも AGENTS.md の配置先はプロジェクトルートのみとし、
        ターゲット別の追加配置や内容分岐は行わない。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-005-1-copy-from-templates
          decision: 配布する AGENTS.md は templates/AGENTS.md からルートへコピーする。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-005-2-agents-overwrite
          decision: AGENTS.md 競合時は既定で保護し、MyDevSetup の --force 指定時のみ上書きを許可する。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-006-dodkit-bundled
      decision: >
        MyDevSetup の install.sh 実行では、選択ターゲット向け DODKit アセットの導入も必須とし、
        MyDevSetup を DODKit 単体インストールへ置き換えない。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions: []

    - id: installer-007-dodkit-invocation
      decision: >
        MyDevSetup install.sh は DODKit install.sh の動作を固定化せず、
        受領した引数列を `bash -s -- ...` で透過委譲する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-007-1-dodkit-source
          decision: >
            DODKit の取得元は
            https://raw.githubusercontent.com/mkgask/dodkit/main/install.sh
            に固定する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-007-2-target-args
          decision: DODKit へ渡すターゲット引数は copilot または cursor のみを許可する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-007-3-decisions-protected
          decision: DODKit 実行時も DECISIONS.yml は上書き保護対象とし、既存決定を失わせない。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-007-4-dodkit-force-fixed
          decision: DODKit への引数は MyDevSetup が受領した値を改変せずそのまま渡す。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-008-console-log-format
      decision: >
        install.sh の成功・警告・エラー行は、指定ラベルと指定色で視認可能に表示し、
        可読性を高めるログ契約を維持する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-008-1-success-label-color
          decision: 成功ログは [✅️SUCCESS] ラベルを緑色で表示する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-008-2-error-label-color
          decision: エラーログは [❌️ERROR] ラベルを赤色で表示する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-008-3-warning-label-color
          decision: 警告ログは [⚠️WARNING] ラベルを黄色で表示する。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-009-principles-md-deploy
      decision: >
        install.sh は AGENTS.md 配布に加えて
        templates/.docs/PRINCIPLES.md を .docs/PRINCIPLES.md へ配布する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-009-1-principles-path-contract
          decision: PRINCIPLES.md のコピー元は templates/.docs/PRINCIPLES.md、配置先は .docs/PRINCIPLES.md に固定する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-009-2-principles-overwrite
          decision: .docs/PRINCIPLES.md 競合時は既定で保護し、MyDevSetup の --force 指定時のみ上書きを許可する。
          status: "✅️Implementation Approved"
          sub_decisions: []

    - id: installer-010-asset-list-loop
      decision: >
        install.sh の配布アセット管理は、配布元・配置先・表示名を持つ定数リストへ集約し、
        配布処理はそのリストをループして実行する。
      status: "✅️Implementation Approved"
      link: "records/installer-001-ai-dev-setup.md"
      sub_decisions:
        - id: installer-010-1-list-contract
          decision: 配布アセットの定義は source path / destination path / asset name の3要素で保持する。
          status: "✅️Implementation Approved"
          sub_decisions: []
        - id: installer-010-2-loop-install
          decision: main は個別インストール関数を呼ばず、定義済みアセットリストのループで install_template_asset を呼び出す。
          status: "✅️Implementation Approved"
          sub_decisions: []


  dev-tools:
    - id: installer-011-optional-tool-installation
      decision: >
        install.sh の開発用ツール導入フローは Linux/WSL で不足している汎用CLIを任意導入できるようにし、
        既存の AGENTS.md 本文を保護したまま導入成功した新規ツールを処理の最後に記録する。
        既定の install モードはCLI本体の導入だけとし、AI連携設定やプロジェクト索引作成を自動化しない。
        明示的な init モードでは、導入済みで現在プロジェクトの利用に初期設定が必要なツールについて、公式の初期設定を実行できる。
        対象には python、ruby、rg、rtk、codegraph、uv、Serena を含める。
      status: "✅️Implementation Approved"
      link: "records/dev-tools-001-optional-tool-installation.md"
      sub_decisions:
        - id: installer-011-1-tool-order-and-prompt
          decision: >
            不足時の確認対象は python、ruby、rg、rtk、codegraph、uv、Serena の順とし、存在するツールは質問せず、
            未導入のツールだけを各一回ずつの導入方法選択で確認する。選択肢はツールごとの対応表から生成し、
            codegraph、uv、Serena の実行コマンド名はそれぞれ codegraph、uv、serena とする。空入力時の既定導入方法はツールごとに固定する。
            uv は Serena より先に処理し、Serena の導入依存を同一実行内で満たせる順序を保つ。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-2-installation-backends
          decision: >
            対応環境は Linux/WSL に限定し、導入方法は対象ツールを扱える既存の system、nix、proto、mise、asdf、
            official の経路から選ぶ。nix、proto、mise、asdf は実行可能なコマンドと対象ツールの対応を検出できた場合だけ候補にし、
            system も対応する既存のシステムパッケージマネージャーが検出できた場合だけ候補にする。マネージャー本体や不足プラグインは自動導入しない。
            uv は公式standalone installerを使う official route とし、Serena は uv が利用可能な場合だけ `uv tool install` を使う uv-tool route とする。
            --global では全プロジェクトから利用可能な導入先を持つ経路だけを候補にし、該当経路がなければ skip とする。
            uv が未導入または導入失敗した場合、Serena の uv-tool route は候補にせず、Serenaを暗黙に別経路で導入しない。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-3-command-and-version-contract
          decision: >
            python3 は Python の導入済みコマンドとして受け入れ、AGENTS.md には実際に検証できたコマンド名を記載する。
            選択された導入経路は各経路の最新安定版を既定とし、公式インストーラーが対応するツールでは official も選択肢にする。
            uv は `uv`、Serena は `serena-agent` package が提供する `serena` を導入後検証し、公式の環境変数等によるバージョン固定を妨げない。
            導入後は実際に検証できた実行コマンドを記録する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-4-third-party-cli-scope
          decision: >
            既定の install モードでは rtk、codegraph、uv、Serena を含む対象ツールのCLI本体だけを配置し、rtk init、codegraph install、codegraph init、uv init などの初期設定を自動実行しない。
            SerenaのMCPクライアント設定、プロジェクト作成、プロジェクト索引、HTTP daemon/service化も自動実行しない。
            明示的な init モードでは、現在プロジェクトで利用するために必要な公式の初期設定をツールごとに実行できる。
            ~/.local/bin のためにシェル設定ファイルを変更せず、導入先の検証に必要なPATH調整は今回の実行中に限定する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-5-failure-and-noninteractive-policy
          decision: >
            install の空入力はそのツールに設定された既定導入方法を選択し、TTYがない実行では任意ツールをスキップする。
            init は明示指定自体を同意とみなし、ツールごとの追加確認を行わず、利用可能で初期設定が必要なツールだけを処理する。
            install と init の個別失敗では後続ツールを継続し、処理末尾に成功・失敗・スキップをまとめて表示する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-6-agents-tool-record
          decision: >
            install で導入に成功した新規ツールのうち AGENTS.md に未記載のものだけを、全ツール処理の最後に管理ブロックとして冪等に追記する。
            これは既存本文を変更しない add-only 操作として --force なしでも許可し、既存のテンプレート全体上書き保護は維持する。
            管理ブロックが既にあれば同ブロックだけを更新し、細かな説明は追加しない。uv と Serena も検証できた `uv` と `serena` のコマンド名で他対象と同じ規則に従う。
            明示的な init では、公式ツールが現在プロジェクトで通常行う設定変更をこの install の記録処理とは別に許可する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-7-dev-tools-helper-boundary
          decision: >
            ツール検出・対話・導入・結果集計・AGENTS.md管理ブロック追記の実装は templates/dev-tools.sh に分離する。
            install.sh はこの補助スクリプトを配布し、bash で実行するオーケストレーターに留める。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-8-install-method-selection
          decision: >
            各ツールの選択肢には対応表で利用可能と判定された導入方法だけを表示し、常に skip を含める。
            未導入のマネージャー、対象ツールに未対応のマネージャー、不足プラグインを必要とする経路は表示しない。
            system は Python・Ruby・rg の既存標準経路を既定とし、rtk・codegraph・uv は official を既定とする。Serena は uv-tool を既定とし、利用可能な別経路を同じ1回の選択で選べる。
            Serena の uv-tool は uv の実行可能性を検出できる場合だけ表示する。
            選択後にマネージャーやプラグインの導入確認を追加せず、利用可能な導入方法がない場合は skip とする。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-9-helper-destination
          decision: >
            dev-tools.sh の標準配置先は対象プロジェクトの .dev/dev-tools.sh とする。.dev/ が未存在なら確認なしで作成し、
            既存の .dev/ ディレクトリがある場合だけ配置先ディレクトリを尋ねる。空入力は .dev/ と解釈し、配置先の dev-tools.sh は上書きする。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-10-helper-first-integration
          decision: >
            templates/dev-tools.sh の単体実装と挙動検証を先に完了し、その後に install.sh の配布アセット追加と bash による実行委譲を実装する。
            install.sh の既存アセット保護、DODKit 引数透過、DODKit と AGENTS.md 管理ブロックの処理順序は維持する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-11-process-scoped-manager-activation
          decision: >
            通常の install でマネージャー導入後の検証に必要なPATH変更は現在のinstall.shプロセス内だけに限定し、シェル起動ファイルや
            protoのグローバルpinなどの永続設定を追加しない。--global の install では、全プロジェクトから利用可能な導入経路の検証に必要な一時的PATH・manager activationの拡張だけを許可し、
            shell起動ファイル、manager設定全体、agent設定の永続変更は行わない。uv standalone installer後はuvの導入先を、Serena導入後は `uv tool dir --bin` の結果を現在プロセスのPATHへ反映して検証する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-12-test-file-naming
          decision: >
            開発用テストの標準ファイル名は tests/dev-tools.test.sh と tests/install.test.sh とし、テスト実行コマンドや参照箇所もこの名前へ同期する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-13-logging-and-data-output
          decision: >
            templates/dev-tools.sh のユーザー向け warning、error、success は install.sh と同じラベル、TTY・NO_COLORによる色制御、標準出力・標準エラーの振り分けで出力し、成功状態には log_success を使う。
            ログではないコマンド置換の戻り値、プロンプト、構造化サマリー、AGENTS.mdやfixtureの内容生成は log_* に変換せず、必要に応じてデータ出力関数へ分離する。
            install と status のsummary結果行はモードに依存しない共通のデータ出力関数で描画し、summaryのタイトル表示と各モードの終了status判定はモード側で行う。
            テストのfixture生成や診断出力は本番ログ契約と混同しない。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-14-global-install-scope
          decision: >
            --global は install モードで導入したバイナリを全プロジェクトから利用可能にする導入スコープだけを表し、initの適用範囲、manager設定全体の永続化、agent設定のglobal適用は含めない。
            --global の候補はそのスコープを実現できる導入経路だけに限定し、init --global はエラーとする。uv official と Serena uv-tool はユーザー単位のbinへ導入し全プロジェクトから呼び出せるため候補にできるが、protoのグローバルpin、shell起動ファイル変更、manager設定の永続変更は --global でも行わない。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-15-mode-selection
          decision: >
            補助スクリプトは dev-tools.sh [install|init|status] [--global] [--debug] の位置引数を受け付け、モード省略時は install とする。install は不足CLIの検出・選択・導入・検証・AGENTS.md記録を行い、init は導入済みツールのプロジェクト設定だけを行い、status は現在のCLI状態だけを検証する。
            --global と --debug は引数の位置を問わず受け付け、同じflagの複数指定は冪等に扱う。--debug はこの補助スクリプトの一回限りの診断指定であり、環境変数による代替指定は提供しない。
            --global は install との組み合わせだけを許可し、init または status との組み合わせは明示的な引数エラーとする。initではuvを常に初期設定不要としてskipし、Serenaはサーバー側runtime準備だけを行う。トップレベル install.sh の引数透過契約や、install.sh から補助スクリプトへ --debug を渡す契約はこの決定に含めない。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-16-project-init-scope
          decision: >
            明示的な init は不足バイナリを導入せず、現在プロジェクトで利用可能かつ初期設定が必要なツールについて、公式CLIが通常行うプロジェクト単位の設定を追加確認なしで実行する。
            初期設定不要または未導入のツールはスキップし、uvは常に初期設定不要として `uv init`、`uv sync`、virtualenv作成を行わない。
            Serenaは利用可能な場合だけ `serena init` を実行し、`serena start-mcp-server --help` でMCP server起動CLIを検証する。これはSerena自身のMCP server実行に必要なユーザー側runtime設定を作る限定例外であり、MCPクライアント設定、`serena project create`、project index、他プロジェクトへの設定適用は行わない。
            個別の初期設定失敗では後続ツールを継続し、初期設定が安全に非対話実行できない場合は無理に実行せず失敗またはスキップとして記録する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-17-failure-diagnostics
          decision: >
            install と init の外部コマンド失敗、および導入後のコマンド検証失敗は、後続ツールの処理を継続しつつ、対象ツールの結果・error・最終summaryに実行コマンドと終了コードを記録し、補助スクリプト全体は失敗を反映した非0を返す。
            status の `--version` 検証で利用不能な対象も、検証詳細を結果へ残し、全対象の確認を継続したうえで最終summary表示後に非0を返す。
            dev-tools.sh に --debug が明示されたときだけ、外部install/initコマンドと導入後検証コマンドの実行前traceを stderr へ [🔵DEBUG] ラベルで出力する。uv tool route、Serenaのserver-side init、MCP server CLI検証もこの診断契約に含める。
            --debug がない通常実行と DEV_TOOLS_DEBUG 環境変数だけを設定した実行ではtraceを出力せず、既存の標準出力・標準エラーのwarning／error／successログ契約を変更しない。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-18-uv-and-serena-installation
          decision: >
            uv はAstralのstandalone installerを使う official route で導入し、Serenaはuvが利用可能な場合だけ `uv tool install -p 3.13 serena-agent` で導入する。
            Serenaの導入依存を理由にuvの導入を暗黙同意扱いにせず、uvをskipまたは導入失敗した場合はSerenaを別経路で導入しない。両者の導入・検証成功後はAGENTS.md管理ブロックへ実行可能なコマンドを記録する。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-19-serena-server-initialization
          decision: >
            Serenaの明示的な init は `serena init` を一回実行し、`serena start-mcp-server --help` でstdio MCP server起動CLIの存在を検証するまでとする。helper自身はMCP serverを長時間起動・常駐させず、クライアント設定、project create、project index、HTTP daemon/service化も行わない。
            `serena init` がSerena自身のMCP server実行に必要なユーザー側runtime設定を `~/.serena` 等へ作成することだけを許可する限定例外とし、クライアント設定や他プロジェクトへの設定適用は許可しない。
          status: "✅️Implementation Approved"
          sub_decisions: []

        - id: installer-011-20-status-mode
          decision: >
            status は対象ツールの現在状態を表示する読み取り専用モードとし、現在の対象順で全ツールに対して既存の `find_tool_command` による実行可能性と `--version` 検証だけを行う。検証成功は `present`、検出またはversion検証が完了しない対象は `unavailable` とし、検証コマンド・終了コードを結果詳細へ残す。
            status はprompt、install、init、project設定、AGENTS.md更新、永続的なPATH・manager・agent設定を行わず、全対象を処理してからsummaryの結果行を表示する。1件でも `unavailable` があれば、summary表示後に補助スクリプト全体の終了statusを1とする。
            `summary` はstatusの公開aliasにせず、`status --global` は引数エラーとする。`--debug` はstatusのversion検証traceに限り利用でき、Linux/WSL判定と現在プロセス内のPATH準備は既存契約を維持する。
          status: "✅️Implementation Approved"
          link: "records/dev-tools-001-optional-tool-installation.md"
          sub_decisions: []
